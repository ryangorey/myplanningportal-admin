<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Staff sign in | myplanningportal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-styles.css">
</head>
<body>

<div class="admin-login-page">
  <img class="portal-logo" src="https://raw.githubusercontent.com/ryangorey/RGMLlogo/102e74830a7fd89dca2451699469c742463da962/my_planning_portal_logo_dark_bg_small.png" alt="myplanningportal">

  <div class="admin-card">
    <h1>Staff sign in</h1>
    <p class="sub">Bookings, equipment, and packages for all three brands.</p>

    <div id="status" class="portal-status"></div>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn-primary" id="submit-btn" style="width:100%;height:40px;margin-top:6px;">Sign in</button>
    </form>
  </div>
</div>

<script src="admin-config.js"></script>
<script>
  const form = document.getElementById("login-form");
  const submitBtn = document.getElementById("submit-btn");
  const status = document.getElementById("status");

  function showStatus(kind, message) {
    status.textContent = message;
    status.className = "portal-status show " + kind;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in...";
    status.className = "portal-status";

    try {
      const resp = await fetch(API_BASE_URL + "/api/auth/login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      });
      const data = await resp.json().catch(function () { return null; });

      if (!resp.ok) {
        showStatus("error", (data && data.error) || "Couldn't sign in. Try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
        return;
      }

      localStorage.setItem("mpp_staff_session", JSON.stringify({
        token: data.token,
        staff: data.staff
      }));
      window.location.replace("/admin.html");
    } catch (err) {
      showStatus("error", "Couldn't reach the server. Check your connection and try again.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Sign in";
    }
  });
</script>

</body>
</html>
